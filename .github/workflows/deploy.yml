name: Deploy Docker App

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: 3.123.1.42
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
  echo "Connected to EC2 successfully "

  # Create project folder
  mkdir -p devops-docker-app
  cd devops-docker-app

  # Clone repo if not exists, else pull latest
  if [ ! -d ".git" ]; then
    git clone https://github.com/Ugomichy/devops-docker-app.git .
  else
    git pull origin main
  fi

  # Stop old container if exists
  docker stop my-app || true
  docker rm my-app || true

  # Build Docker image
  docker build -t my-app .

  # Run container
  docker run -d -p 80:80 --name my-app my-app

  echo "Deployment complete "
