name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Create SSH key
        run: |
          echo "${{ secrets.EC2_SSH_KEY }}" > key.pem
          chmod 600 key.pem

      - name: Connect and Deploy
        run: |
          ssh -o StrictHostKeyChecking=no -i key.pem ubuntu@3.123.1.42 << 'EOF'
            cd /home/ubuntu
            echo "Connected successfully"
          EOF
