name: Debug SSH Runner

on:
  push:
    branches:
      - main

jobs:
  debug:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Start tmate session
        uses: mxschmitt/action-tmate@v3

      - name: Keep job running
        run: sleep 600
